<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 160px);
      grid-template-rows: repeat(3, 160px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.p1 { color: #e94560; }
    .cell.p2 { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover { background: #c73652; transform: scale(1.04); }

    #score {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 2rem; font-weight: bold; }
    .score-box.p1-score span { color: #e94560; }
    .score-box.p2-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #888; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="score">
  <div class="score-box p1-score">Player 1 <span id="xScore">0</span></div>
  <div class="score-box draw-score">Draws <span id="drawScore">0</span></div>
  <div class="score-box p2-score">Player 2 <span id="oScore">0</span></div>
</div>

<div id="status">Player 1's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="restart">New Game</button>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const restartBtn = document.getElementById('restart');
  const xScoreEl = document.getElementById('xScore');
  const oScoreEl = document.getElementById('oScore');
  const drawScoreEl = document.getElementById('drawScore');

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  const PLAYERS = { '1': 'p1', '2': 'p2' };
  let board, current, gameOver, score = { '1': 0, '2': 0, draw: 0 };

  function init() {
    board = Array(9).fill('');
    current = '1';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className = 'cell';
    });
    status.textContent = "Player 1's turn";
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    if (board.every(v => v)) return { winner: 'draw' };
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current === '1' ? 'X' : 'O';
      cell.classList.add(PLAYERS[current], 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          status.textContent = "It's a draw!";
          score.draw++;
          drawScoreEl.textContent = score.draw;
        } else {
          status.textContent = `Player ${result.winner} wins!`;
          result.line.forEach(idx => cells[idx].classList.add('win'));
          score[result.winner]++;
          xScoreEl.textContent = score['1'];
          oScoreEl.textContent = score['2'];
        }
      } else {
        current = current === '1' ? '2' : '1';
        status.textContent = `Player ${current}'s turn`;
      }
    });
  });

  restartBtn.addEventListener('click', init);

  init();
</script>
</body>
</html>
